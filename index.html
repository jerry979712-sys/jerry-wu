<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股損益與配息紀錄本</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 深色模式變數設定 */
        :root { 
            --bg-color: #f4f7f6; --text-color: #333; --card-bg: white; --border-color: #eee; 
            --thead-bg: #f8f9fa; --input-border: #ccc; --box-shadow: rgba(0,0,0,0.05);
            --profit-color: #198754; --loss-color: #dc3545; --accent-color: #0d6efd;
            --setting-bg: #f8f9fa; --setting-border: #e9ecef;
        }
        body.dark-mode {
            --bg-color: #121212; --text-color: #e0e0e0; --card-bg: #1e1e1e; --border-color: #333;
            --thead-bg: #2d2d2d; --input-border: #555; --box-shadow: rgba(0,0,0,0.5);
            --profit-color: #28a745; --loss-color: #ff4d4d; --accent-color: #4da3ff;
            --setting-bg: #2a2a2a; --setting-border: #444;
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; max-width: 1300px; margin: auto; background-color: var(--bg-color); color: var(--text-color); transition: 0.3s; }
        .container { background-color: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px var(--box-shadow); margin-bottom: 20px; transition: 0.3s; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 15px; }
        .input-group input, .input-group select { flex: 1; min-width: 120px; padding: 10px; border: 1px solid var(--input-border); border-radius: 6px; background-color: var(--card-bg); color: var(--text-color); }
        .setting-box { background-color: var(--setting-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--setting-border); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95em; transition: 0.2s; white-space: nowrap; font-weight: bold; }
        .btn-primary { background-color: #0d6efd; color: white; } .btn-primary:hover { background-color: #0b5ed7; }
        .btn-danger { background-color: #dc3545; color: white; padding: 6px 12px; } .btn-danger:hover { background-color: #c82333; }
        .btn-success { background-color: #198754; color: white; padding: 6px 12px; } .btn-success:hover { background-color: #157347; }
        .btn-info { background-color: #0dcaf0; color: #000; } .btn-info:hover { background-color: #31d2f2; }
        .btn-dark { background-color: #343a40; color: white; } .btn-dark:hover { background-color: #23272b; }
        
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 6px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; min-width: 900px; }
        th, td { border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); padding: 12px; text-align: right; vertical-align: middle; }
        th { background-color: var(--thead-bg); text-align: center; white-space: nowrap; }
        th.sortable { cursor: pointer; user-select: none; } th.sortable:hover { opacity: 0.8; }
        td:first-child, td:nth-child(2) { text-align: left; font-weight: bold; }
        
        .profit { color: var(--profit-color); font-weight: bold; }
        .loss { color: var(--loss-color); font-weight: bold; }
        .realtime-price { color: var(--accent-color); font-weight: bold; font-size: 1.05em; }
        .fee-hint { font-size: 0.75em; color: #888; display: block; margin-top: 4px; font-weight: normal; }
        .div-total { color: #d35400; font-weight: bold; font-size: 1.1em; }
        
        .dashboard { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .chart-container, .tool-container { flex: 1; min-width: 300px; background: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px var(--box-shadow); }
        .chart-wrapper { position: relative; height: 200px; width: 100%; }
        
        .calc-box { background-color: var(--setting-bg); border: 1px solid var(--setting-border); padding: 15px; border-radius: 8px; margin-top: 10px; }
        
        /* 總被動收入特別區塊 */
        .passive-income-box { text-align: center; padding: 15px; background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; color: #333; }
        body.dark-mode .passive-income-box { background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%); border: 1px solid #444; color: #e0e0e0; }
        .income-number { font-size: 2.5em; font-weight: bold; color: #d35400; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); margin: 5px 0; }
    </style>
</head>
<body onload="checkDarkMode()">

<div class="header-bar">
    <h1 style="margin: 0;">📈 存股損益與被動收入追蹤系統</h1>
    <button class="btn-dark" onclick="toggleDarkMode()" id="darkModeBtn">🌙 切換深色模式</button>
</div>

<div class="dashboard">
    <div class="tool-container" style="flex: 2;">
        <h3 style="margin-top: 0;">🏆 累積被動收入 (自動計算自買進日後配息)</h3>
        <div class="passive-income-box">
            <div>你已透過這份投資組合領取了</div>
            <div class="income-number" id="totalPassiveIncome">$0</div>
            <div style="font-size: 0.9em; color: #888;">這筆錢是完全不用工作就掉進口袋的！繼續保持紀律！</div>
        </div>
        
        <h3 style="margin-top: 0;">📉 加碼 / 攤平試算機</h3>
        <div class="calc-box">
            <div class="input-group" style="margin-bottom: 0;">
                <select id="calcSymbol" onchange="runCalc()"><option value="">選擇持股...</option></select>
                <input type="number" id="calcAddShares" placeholder="打算加碼幾股" oninput="runCalc()">
                <input type="number" id="calcAddPrice" placeholder="加碼單價" oninput="runCalc()">
            </div>
            <div id="calcResult" style="margin-top: 10px; font-weight: bold; color: var(--accent-color);">請輸入試算資料...</div>
        </div>
    </div>
    
    <div class="chart-container">
        <h3 style="margin-top: 0; text-align: center;">資金佔比</h3>
        <div class="chart-wrapper"><canvas id="portfolioChart"></canvas></div>
    </div>
</div>

<div class="container">
    <h2 style="margin-top: 0;">📂 我的投資組合</h2>
    <div id="status" style="margin-bottom: 15px; font-weight: bold; color: #666;">啟動中...</div>
    
    <div class="setting-box">
        <div>
            <label>⚙️ 券商手續費：</label>
            <select id="discount" onchange="renderTable()">
                <option value="1.0" selected>無折扣 (全額收取)</option>
                <option value="0.5">5 折</option>
                <option value="0.28">2.8 折</option>
                <option value="0.2">2 折</option>
            </select>
        </div>
        <div>
            <button class="btn-success" onclick="exportCSV()">📊 匯出 Excel (CSV)</button>
            <button class="btn-info" onclick="exportData()">📲 手機同步</button>
            <button class="btn-info" onclick="importData()">📥 匯入</button>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="symbol" placeholder="代號 (例: 00878)" required>
        <input type="number" id="shares" placeholder="購買股數" required>
        <input type="number" id="buyPrice" placeholder="買進均價" required step="0.01">
        <input type="date" id="buyDate" required title="買進日期 (必填，用於計算已領股息)">
        <button id="addBtn" class="btn-primary" onclick="addRecord()" disabled>➕ 新增紀錄</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>買進日期</th>
                    <th>代號</th>
                    <th>名稱</th>
                    <th class="sortable" onclick="setSort('shares')">股數 ↕️</th>
                    <th>買進均價</th>
                    <th class="sortable" onclick="setSort('currentPrice')">最新市價 ↕️</th>
                    <th class="sortable" onclick="setSort('netPl')">預估淨損益 ↕️<br><span class="fee-hint">(已扣費稅)</span></th>
                    <th class="sortable" onclick="setSort('collectedDiv')">歷年已領股息 ↕️<br><span class="fee-hint">(買進日後加總)</span></th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 預設將今天的日期填入「買進日期」
    document.getElementById('buyDate').valueAsDate = new Date();

    let portfolio = JSON.parse(localStorage.getItem('twStockPortfolio')) || [];
    let marketData = {};
    let liveDataCache = {}; 
    let sortCol = 'index'; let sortAsc = true;
    let pieChartInstance = null;

    // 深色模式邏輯
    function checkDarkMode() {
        if(localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeBtn').innerText = '☀️ 切換淺色模式';
        }
    }
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark);
        document.getElementById('darkModeBtn').innerText = isDark ? '☀️ 切換淺色模式' : '🌙 切換深色模式';
        if(pieChartInstance) pieChartInstance.update(); // 重繪圖表適應顏色
    }

    async function fetchGovData(url) {
        const ts = new Date().getTime();
        const proxies = ['https://corsproxy.io/?' + encodeURIComponent(url + '?_t=' + ts), 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url + '?_t=' + ts)];
        for (let p of proxies) {
            try { const res = await fetch(p); if (res.ok) return await res.json(); } catch(e) {}
        }
        return null;
    }

    async function initMarketData() {
        document.getElementById('status').innerHTML = '⏳ 正在連線市場資料庫...';
        const twseData = await fetchGovData('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
        if (twseData) twseData.forEach(stock => { marketData[stock.Code] = { name: stock.Name, market: 'TW', price: parseFloat(stock.ClosingPrice) }; });
        const tpexData = await fetchGovData('https://www.tpex.org.tw/openapi/v1/t187ap14_L');
        if (tpexData) tpexData.forEach(stock => { marketData[stock.SecuritiesCompanyCode] = { name: stock.CompanyName, market: 'TWO', price: parseFloat(stock.Close) }; });

        document.getElementById('addBtn').disabled = false;
        
        // 幫舊資料補上買進日期 (預設為今天)，避免壞掉
        portfolio.forEach(p => { if(!p.buyDate) p.buyDate = new Date().toISOString().split('T')[0]; });
        localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio));

        refreshLiveData();
    }

    async function refreshLiveData() {
        if(portfolio.length > 0) document.getElementById('status').innerHTML = '🔄 正在回溯 5 年歷史配息與最新報價...';
        const ts = new Date().getTime();

        for (let record of portfolio) {
            if (liveDataCache[record.symbol]) continue; 
            const stockInfo = marketData[record.symbol] || { market: 'TW' };
            const suffix = stockInfo.market === 'TWO' ? '.TWO' : '.TW';
            let currentPrice = stockInfo.price || record.buyPrice;
            let collectedDiv = 0; // 已領股息總計

            try {
                // 抓取過去 5 年的資料來回推配息
                const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${record.symbol}${suffix}?range=5y&interval=1d&events=div&_t=${ts}`));
                if (res.ok) {
                    const data = await res.json();
                    if (data.chart && data.chart.result) {
                        const result = data.chart.result[0];
                        currentPrice = result.meta.regularMarketPrice || currentPrice; 
                        
                        // 核心演算法：計算買進日之後的所有配息
                        if (result.events && result.events.dividends && record.buyDate) {
                            const buyTs = new Date(record.buyDate).getTime() / 1000;
                            Object.values(result.events.dividends).forEach(div => {
                                // 如果除息日大於或等於買進日，就代表有領到
                                if (div.date >= buyTs) {
                                    collectedDiv += (div.amount * record.shares);
                                }
                            });
                        }
                    }
                }
            } catch(e) {}
            liveDataCache[record.symbol] = { price: currentPrice, collectedDiv: collectedDiv };
        }
        document.getElementById('status').innerHTML = '✅ 報價與配息資料已更新完成！';
        document.getElementById('status').style.color = 'var(--profit-color)';
        renderTable();
        updateCalcDropdown();
    }

    function addRecord() {
        const symbol = document.getElementById('symbol').value.trim();
        const shares = parseFloat(document.getElementById('shares').value);
        const buyPrice = parseFloat(document.getElementById('buyPrice').value);
        const buyDate = document.getElementById('buyDate').value;

        if (!symbol || isNaN(shares) || isNaN(buyPrice) || !buyDate) { alert('請填寫完整資訊與買進日期！'); return; }
        if (!marketData[symbol]) { alert(`找不到 ${symbol}，請確認代號是否正確。`); return; }

        portfolio.push({ symbol: symbol, shares: shares, buyPrice: buyPrice, buyDate: buyDate });
        localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio));
        
        document.getElementById('symbol').value = ''; document.getElementById('shares').value = ''; 
        document.getElementById('buyPrice').value = ''; 
        refreshLiveData(); 
    }

    function deleteRecord(index) {
        if (confirm('確定要刪除這筆紀錄嗎？')) {
            portfolio.splice(index, 1);
            localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio));
            renderTable();
            updateCalcDropdown();
        }
    }

    function setSort(col) {
        if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = false; }
        renderTable();
    }

    // 匯出 CSV Excel 功能
    function exportCSV() {
        if(portfolio.length === 0) { alert('沒有資料可以匯出'); return; }
        let csvContent = '\uFEFF'; // 解決 Excel 中文亂碼
        csvContent += "買進日期,股票代號,股票名稱,持有股數,買進均價,投入總成本\n";
        
        portfolio.forEach(r => {
            const name = marketData[r.symbol]?.name || '未知';
            const cost = r.shares * r.buyPrice;
            csvContent += `${r.buyDate},="${r.symbol}",${name},${r.shares},${r.buyPrice},${cost}\n`;
        });
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `存股紀錄表_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
    }

    function exportData() {
        const encoded = btoa(encodeURIComponent(JSON.stringify(portfolio)));
        prompt('請複製以下「同步碼」，傳到手機上的 LINE，再從手機點選「匯入」：', encoded);
    }

    function importData() {
        const encoded = prompt('請貼上從電腦傳來的「同步碼」：');
        if (encoded) {
            try {
                const decodedJson = JSON.parse(decodeURIComponent(atob(encoded)));
                portfolio = Array.isArray(decodedJson) ? decodedJson : (decodedJson.p || []);
                portfolio.forEach(p => { if(!p.buyDate) p.buyDate = new Date().toISOString().split('T')[0]; });
                localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio));
                liveDataCache = {}; alert('✅ 同步成功！'); refreshLiveData();
            } catch (e) { alert('❌ 同步碼錯誤。'); }
        }
    }

    // 攤平試算機邏輯
    function updateCalcDropdown() {
        const sel = document.getElementById('calcSymbol');
        sel.innerHTML = '<option value="">選擇持股...</option>';
        portfolio.forEach((r, idx) => {
            const name = marketData[r.symbol]?.name || '';
            sel.innerHTML += `<option value="${idx}">${r.symbol} ${name} (均價 ${r.buyPrice})</option>`;
        });
    }
    
    function runCalc() {
        const idx = document.getElementById('calcSymbol').value;
        const addShares = parseFloat(document.getElementById('calcAddShares').value);
        const addPrice = parseFloat(document.getElementById('calcAddPrice').value);
        const resDiv = document.getElementById('calcResult');
        
        if(idx === "" || isNaN(addShares) || isNaN(addPrice)) {
            resDiv.innerText = "請輸入試算資料..."; return;
        }
        
        const record = portfolio[idx];
        const oldTotal = record.shares * record.buyPrice;
        const newTotal = addShares * addPrice;
        const totalShares = record.shares + addShares;
        const newAvg = (oldTotal + newTotal) / totalShares;
        
        resDiv.innerHTML = `試算結果：總股數將變為 ${totalShares.toLocaleString()} 股，<br>新的總均價將降至 <span style="font-size:1.2em; color:#d35400;">${newAvg.toFixed(2)}</span> 元！`;
    }

    function renderChart(labels, dataValues) {
        const ctx = document.getElementById('portfolioChart').getContext('2d');
        if (pieChartInstance) pieChartInstance.destroy(); 
        Chart.defaults.color = document.body.classList.contains('dark-mode') ? '#e0e0e0' : '#333';

        if (dataValues.length === 0) {
            pieChartInstance = new Chart(ctx, { type: 'pie', data: { labels: ['無資產'], datasets: [{ data: [1], backgroundColor: ['#555'] }] } }); return;
        }

        pieChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: labels, datasets: [{ data: dataValues, backgroundColor: ['#0d6efd', '#198754', '#dc3545', '#ffc107', '#0dcaf0', '#6610f2', '#fd7e14'], borderWidth: 1, borderColor: 'transparent' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
        });
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const discount = parseFloat(document.getElementById('discount').value); 
        let rowObjects = [];
        let totalNetPlAll = 0, chartLabels = [], chartData = [], totalPassiveIncomeAll = 0;

        for (let i = 0; i < portfolio.length; i++) {
            const record = portfolio[i];
            const stockInfo = marketData[record.symbol] || { name: '未知' };
            const liveInfo = liveDataCache[record.symbol] || { price: record.buyPrice, collectedDiv: 0 };
            
            const baseCost = record.shares * record.buyPrice;
            const buyFee = Math.max(20, Math.floor(baseCost * 0.001425 * discount)) * (discount === 0 ? 0 : 1);
            const realTotalCost = baseCost + buyFee; 

            const baseValue = record.shares * liveInfo.price;
            const sellFee = Math.max(20, Math.floor(baseValue * 0.001425 * discount)) * (discount === 0 ? 0 : 1);
            const taxRate = record.symbol.startsWith('00') ? 0.001 : 0.003;
            const sellTax = Math.floor(baseValue * taxRate);
            
            const netPl = baseValue - sellFee - sellTax - realTotalCost;
            
            totalNetPlAll += netPl;
            totalPassiveIncomeAll += liveInfo.collectedDiv;
            
            let existingIndex = chartLabels.indexOf(record.symbol);
            if(existingIndex > -1) { chartData[existingIndex] += baseValue; } 
            else { chartLabels.push(record.symbol); chartData.push(baseValue); }
            
            rowObjects.push({
                originalIndex: i, symbol: record.symbol, name: stockInfo.name, shares: record.shares, buyDate: record.buyDate,
                buyPrice: record.buyPrice, currentPrice: liveInfo.price, netPl: netPl,
                feeTax: buyFee + sellFee + sellTax, collectedDiv: liveInfo.collectedDiv
            });
        }

        // 更新大看板數字
        document.getElementById('totalPassiveIncome').innerText = `$ ${Math.round(totalPassiveIncomeAll).toLocaleString()}`;
        renderChart(chartLabels, chartData);

        if (sortCol !== 'index') {
            rowObjects.sort((a, b) => {
                let valA = a[sortCol]; let valB = b[sortCol];
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1; return 0;
            });
        }

        let htmlContent = '';
        rowObjects.forEach(row => {
            const plClass = row.netPl >= 0 ? 'profit' : 'loss';
            const plSign = row.netPl >= 0 ? '+' : '';

            htmlContent += `
                <tr>
                    <td>${row.buyDate}</td>
                    <td>${row.symbol}</td>
                    <td>${row.name}</td>
                    <td>${row.shares.toLocaleString()}</td>
                    <td>${row.buyPrice.toFixed(2)}</td>
                    <td class="realtime-price">${row.currentPrice.toFixed(2)}</td>
                    <td class="${plClass}">
                        ${plSign}${Math.round(row.netPl).toLocaleString()}
                        <span class="fee-hint">(扣費稅: ${row.feeTax})</span>
                    </td>
                    <td class="div-total">$${Math.round(row.collectedDiv).toLocaleString()}</td>
                    <td class="action-cell">
                        <button class="btn-danger" onclick="deleteRecord(${row.originalIndex})">刪除</button>
                    </td>
                </tr>
            `;
        });

        if(portfolio.length > 0) {
            const totalPlClass = totalNetPlAll >= 0 ? 'profit' : 'loss';
            const totalPlSign = totalNetPlAll >= 0 ? '+' : '';
            htmlContent += `
                <tr style="font-weight: bold; background-color: var(--thead-bg);">
                    <td colspan="6" style="text-align: center;">總結算：</td>
                    <td class="${totalPlClass}" style="font-size:1.1em;">${totalPlSign}${Math.round(totalNetPlAll).toLocaleString()}</td>
                    <td class="div-total">$${Math.round(totalPassiveIncomeAll).toLocaleString()}</td>
                    <td></td>
                </tr>
            `;
        } else {
            htmlContent = '<tr><td colspan="9" style="text-align:center;">目前無紀錄</td></tr>';
        }
        
        document.getElementById('tableBody').innerHTML = htmlContent;
    }

    initMarketData();
</script>

</body>
</html>
