<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股損益與配息紀錄本</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg-color: #f4f7f6; --text-color: #333; --card-bg: white; --border-color: #eee; 
            --thead-bg: #f8f9fa; --input-border: #ccc; --box-shadow: rgba(0,0,0,0.05);
            --profit-color: #198754; --loss-color: #dc3545; --accent-color: #0d6efd;
            --setting-bg: #f8f9fa; --setting-border: #e9ecef; --history-bg: #fafafa;
            --target-bg: rgba(255, 193, 7, 0.15); --stop-bg: rgba(220, 53, 69, 0.1);
        }
        body.dark-mode {
            --bg-color: #121212; --text-color: #e0e0e0; --card-bg: #1e1e1e; --border-color: #333;
            --thead-bg: #2d2d2d; --input-border: #555; --box-shadow: rgba(0,0,0,0.5);
            --profit-color: #28a745; --loss-color: #ff4d4d; --accent-color: #4da3ff;
            --setting-bg: #2a2a2a; --setting-border: #444; --history-bg: #1a1a1a;
            --target-bg: rgba(255, 193, 7, 0.15); --stop-bg: rgba(220, 53, 69, 0.2);
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; max-width: 1400px; margin: auto; background-color: var(--bg-color); color: var(--text-color); transition: 0.3s; }
        .container { background-color: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px var(--box-shadow); margin-bottom: 20px; transition: 0.3s; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;}
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 15px; }
        .input-group input, .input-group select { flex: 1; min-width: 100px; padding: 8px 10px; border: 1px solid var(--input-border); border-radius: 6px; background-color: var(--card-bg); color: var(--text-color); font-size: 0.95em;}
        .setting-box { background-color: var(--setting-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--setting-border); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        button { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; transition: 0.2s; white-space: nowrap; font-weight: bold; }
        .btn-primary { background-color: #0d6efd; color: white; padding: 10px 15px;} .btn-primary:hover { background-color: #0b5ed7; }
        .btn-danger { background-color: #dc3545; color: white; } .btn-danger:hover { background-color: #c82333; }
        .btn-success { background-color: #198754; color: white; } .btn-success:hover { background-color: #157347; }
        .btn-info { background-color: #0dcaf0; color: #000; } .btn-info:hover { background-color: #31d2f2; }
        .btn-dark { background-color: #343a40; color: white; padding: 10px 15px; } .btn-dark:hover { background-color: #23272b; }
        .btn-outline { background-color: transparent; border: 1px solid var(--text-color); color: var(--text-color); }
        
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 6px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; min-width: 1100px; }
        th, td { border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); padding: 10px 8px; text-align: center; vertical-align: middle; }
        th { background-color: var(--thead-bg); white-space: nowrap; }
        th.sortable { cursor: pointer; user-select: none; } th.sortable:hover { opacity: 0.8; }
        td.text-left { text-align: left; }
        
        tr.target-reached td { background-color: var(--target-bg); }
        tr.stop-reached td { background-color: var(--stop-bg); }
        
        .profit { color: var(--profit-color); font-weight: bold; }
        .loss { color: var(--loss-color); font-weight: bold; }
        .realtime-price { font-weight: bold; font-size: 1.1em; }
        .sub-text { font-size: 0.8em; color: #888; display: block; margin-top: 2px; font-weight: normal; }
        .div-total { color: #d35400; font-weight: bold; font-size: 1.05em; }
        
        .dashboard { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; align-items: stretch; }
        .dash-card { flex: 1; min-width: 250px; background: var(--card-bg); padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px var(--box-shadow); display: flex; flex-direction: column; justify-content: space-between;}
        
        .income-number { font-size: 2.2em; font-weight: bold; color: #d35400; text-align: center; margin: 10px 0; }
        .sparkline-container { width: 80px; height: 30px; margin: 5px auto 0 auto; }
        .vs-market { text-align: center; padding: 10px; border-radius: 8px; background: var(--setting-bg); border: 1px solid var(--setting-border); }
        
        .note-icon { cursor: pointer; opacity: 0.5; transition: 0.2s; font-size: 1.2em; }
        .note-icon.active { opacity: 1; color: #ffc107; text-shadow: 0 0 5px rgba(255,193,7,0.5); }
    </style>
</head>
<body onload="checkDarkMode()">

<div class="header-bar">
    <h1 style="margin: 0;">📈 全能存股戰情室</h1>
    <button class="btn-dark" onclick="toggleDarkMode()" id="darkModeBtn">🌙 護眼模式</button>
</div>

<div class="dashboard">
    <div class="dash-card">
        <h3 style="margin: 0 0 10px 0; text-align: center;">🏆 累積被動收入</h3>
        <div class="income-number" id="totalPassiveIncome">$0</div>
        <button class="btn-success" style="width: 100%;" onclick="showDripCalc()">♻️ 股息再投入(DRIP)買股試算</button>
    </div>
    
    <div class="dash-card">
        <h3 style="margin: 0 0 10px 0; text-align: center;">🥇 績效戰情室</h3>
        <div style="display: flex; gap: 10px; height: 100%;">
            <div class="vs-market" style="flex: 1;">
                <div class="sub-text">加權指數 (大盤)</div>
                <div id="taiexPrice" style="font-weight:bold; font-size:1.2em; margin-top:5px;">載入中</div>
                <div id="taiexChange" style="font-size:0.9em; margin-top:5px;">--</div>
            </div>
            <div class="vs-market" style="flex: 1;">
                <div class="sub-text">我的總報酬率</div>
                <div id="myTotalRoi" style="font-weight:bold; font-size:1.4em; margin-top:5px;">0.00%</div>
                <div id="myTotalPl" style="font-size:0.9em; margin-top:5px;">$0</div>
            </div>
        </div>
    </div>
    
    <div class="dash-card" style="flex: 2; min-width: 400px;">
        <h3 style="margin: 0 0 5px 0; text-align: center;">📅 月度現金流預估</h3>
        <div style="position: relative; height: 120px; width: 100%;"><canvas id="dividendChart"></canvas></div>
    </div>
</div>

<div class="container">
    <div class="header-bar" style="margin-bottom: 10px;">
        <h2 style="margin: 0;">📂 我的投資組合</h2>
        <div id="status" style="font-weight: bold; color: #666;">啟動中...</div>
    </div>
    
    <div class="setting-box">
        <div style="display:flex; align-items:center; gap:10px;">
            <label>⚙️ 手續費：</label>
            <select id="discount" onchange="renderTable()">
                <option value="1.0" selected>無折扣</option><option value="0.5">5 折</option>
                <option value="0.28">2.8 折</option><option value="0.2">2 折</option>
            </select>
        </div>
        <div>
            <button class="btn-outline" onclick="exportCSV()">📊 匯出 CSV</button>
            <button class="btn-outline" onclick="exportData()">📲 同步碼</button>
            <button class="btn-outline" onclick="importData()">📥 匯入</button>
        </div>
    </div>

    <div class="input-group">
        <div><span class="sub-text">買進日期</span><input type="date" id="buyDate" required></div>
        <div><span class="sub-text">代號</span><input type="text" id="symbol" placeholder="例: 00878" required style="width: 80px;"></div>
        <div><span class="sub-text">股數</span><input type="number" id="shares" placeholder="股數" required style="width: 90px;"></div>
        <div><span class="sub-text">均價</span><input type="number" id="buyPrice" placeholder="均價" required step="0.01" style="width: 80px;"></div>
        <div><span class="sub-text" style="color:#d39e00;">停利價(選)</span><input type="number" id="targetPrice" placeholder="選填" step="0.01" style="width: 80px; border-color: #ffc107;"></div>
        <div><span class="sub-text" style="color:#dc3545;">停損價(選)</span><input type="number" id="stopLoss" placeholder="選填" step="0.01" style="width: 80px; border-color: #dc3545;"></div>
        <button id="addBtn" class="btn-primary" onclick="addRecord()" disabled style="align-self: flex-end; margin-bottom: 2px;">➕ 新增紀錄</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th class="text-left">代號/名稱</th>
                    <th>買進資訊 (日期/股數/均價)</th>
                    <th class="sortable" onclick="setSort('currentPrice')">即時報價 & 30天趨勢 ↕️</th>
                    <th class="sortable" onclick="setSort('netPl')">預估淨損益 ↕️</th>
                    <th class="sortable" onclick="setSort('yieldOnCost')">個人殖利率 & 配息 ↕️</th>
                    <th>操作與筆記</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('buyDate').valueAsDate = new Date();

    let portfolio = JSON.parse(localStorage.getItem('twStockPortfolio')) || [];
    let historyLedger = JSON.parse(localStorage.getItem('twStockHistory')) || [];
    let marketData = {}; let liveDataCache = {}; 
    let taiexData = { price: 0, changePercent: 0 };
    let sortCol = 'index'; let sortAsc = true;
    let barChartInstance = null; let sparklineInstances = [];
    let totalPassiveIncomeGlobal = 0;

    function checkDarkMode() {
        if(localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeBtn').innerText = '☀️ 淺色模式';
        }
    }
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        document.getElementById('darkModeBtn').innerText = document.body.classList.contains('dark-mode') ? '☀️ 淺色模式' : '🌙 護眼模式';
        if(barChartInstance) barChartInstance.update();
        renderTable(); // 重新渲染小蛇圖顏色
    }

    async function fetchGovData(url) {
        const ts = new Date().getTime();
        const proxies = ['https://corsproxy.io/?' + encodeURIComponent(url + '?_t=' + ts), 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url + '?_t=' + ts)];
        for (let p of proxies) { try { const res = await fetch(p); if (res.ok) return await res.json(); } catch(e) {} }
        return null;
    }

    async function initMarketData() {
        document.getElementById('status').innerHTML = '⏳ 連線中...';
        const twseData = await fetchGovData('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
        if (twseData) twseData.forEach(stock => { marketData[stock.Code] = { name: stock.Name, market: 'TW', price: parseFloat(stock.ClosingPrice) }; });
        const tpexData = await fetchGovData('https://www.tpex.org.tw/openapi/v1/t187ap14_L');
        if (tpexData) tpexData.forEach(stock => { marketData[stock.SecuritiesCompanyCode] = { name: stock.CompanyName, market: 'TWO', price: parseFloat(stock.Close) }; });

        document.getElementById('addBtn').disabled = false;
        
        portfolio.forEach(p => { 
            if(!p.buyDate) p.buyDate = new Date().toISOString().split('T')[0]; 
            if(p.note === undefined) p.note = ""; // 新增筆記欄位
        });
        localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio));

        refreshLiveData();
    }

    async function refreshLiveData() {
        if(portfolio.length > 0) document.getElementById('status').innerHTML = '🔄 抓取即時報價與大盤資料...';
        const ts = new Date().getTime();

        // 抓取大盤資料 (^TWII)
        try {
            const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/^TWII?interval=1d&range=1d&_t=${ts}`));
            if(res.ok) {
                const data = await res.json();
                const meta = data.chart.result[0].meta;
                taiexData.price = meta.regularMarketPrice;
                taiexData.changePercent = meta.regularMarketChangePercent || ((meta.regularMarketPrice / meta.chartPreviousClose - 1)*100);
                
                const tPriceEl = document.getElementById('taiexPrice');
                const tChangeEl = document.getElementById('taiexChange');
                tPriceEl.innerText = taiexData.price.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
                
                if(taiexData.changePercent >= 0) {
                    tChangeEl.innerHTML = `<span class="profit">▲ ${taiexData.changePercent.toFixed(2)}%</span>`;
                } else {
                    tChangeEl.innerHTML = `<span class="loss">▼ ${Math.abs(taiexData.changePercent).toFixed(2)}%</span>`;
                }
            }
        } catch(e) { console.error("大盤載入失敗"); }

        // 抓取個股資料與 30天歷史走勢 (Sparkline)
        for (let record of portfolio) {
            if (liveDataCache[record.symbol]) continue; 
            const stockInfo = marketData[record.symbol] || { market: 'TW' };
            const suffix = stockInfo.market === 'TWO' ? '.TWO' : '.TW';
            let currentPrice = stockInfo.price || record.buyPrice;
            let dailyChangePct = 0;
            let rawDividends = []; 
            let historyPrices = [];

            try {
                // 擴大 range=1mo 抓取過去一個月的收盤價來畫小蛇圖
                const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${record.symbol}${suffix}?range=1y&interval=1d&events=div&_t=${ts}`));
                if (res.ok) {
                    const data = await res.json();
                    if (data.chart && data.chart.result) {
                        const result = data.chart.result[0];
                        currentPrice = result.meta.regularMarketPrice || currentPrice; 
                        dailyChangePct = result.meta.regularMarketChangePercent || 0;
                        
                        if (result.events && result.events.dividends) {
                            rawDividends = Object.values(result.events.dividends).sort((a, b) => b.date - a.date);
                        }
                        
                        // 擷取最後 30 天的收盤價
                        if (result.indicators.quote[0].close) {
                            const closes = result.indicators.quote[0].close.filter(p => p !== null);
                            historyPrices = closes.slice(-30);
                        }
                    }
                }
            } catch(e) {}
            liveDataCache[record.symbol] = { price: currentPrice, changePct: dailyChangePct, dividends: rawDividends, history: historyPrices };
        }
        document.getElementById('status').innerHTML = '✅ 資料已同步';
        document.getElementById('status').style.color = 'var(--profit-color)';
        renderTable();
    }

    function addRecord() {
        const symbol = document.getElementById('symbol').value.trim();
        const shares = parseFloat(document.getElementById('shares').value);
        const buyPrice = parseFloat(document.getElementById('buyPrice').value);
        const buyDate = document.getElementById('buyDate').value;
        const targetPrice = parseFloat(document.getElementById('targetPrice').value) || null;
        const stopLoss = parseFloat(document.getElementById('stopLoss').value) || null;

        if (!symbol || isNaN(shares) || isNaN(buyPrice) || !buyDate) { alert('請填寫必填資訊！'); return; }
        
        portfolio.push({ symbol: symbol, shares: shares, buyPrice: buyPrice, buyDate: buyDate, targetPrice: targetPrice, stopLoss: stopLoss, note: "" });
        localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio));
        
        document.getElementById('symbol').value = ''; document.getElementById('shares').value = ''; 
        document.getElementById('buyPrice').value = ''; document.getElementById('targetPrice').value = ''; document.getElementById('stopLoss').value = '';
        refreshLiveData(); 
    }

    function editNote(index) {
        const record = portfolio[index];
        const newNote = prompt(`請輸入 ${record.symbol} 的交易筆記與策略：`, record.note || "");
        if (newNote !== null) {
            record.note = newNote;
            localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio));
            renderTable();
        }
    }
    
    function showDripCalc() {
        if(totalPassiveIncomeGlobal <= 0) {
            alert('您目前還沒有累積被動收入喔！'); return;
        }
        let msg = `💰 您的股息金庫目前有：$${Math.round(totalPassiveIncomeGlobal).toLocaleString()}\n\n這些錢如果拿去買現在持有的股票，可以買：\n`;
        let optionsFound = false;
        
        // 使用 Set 避免重複列出同代號股票
        const uniqueSymbols = [...new Set(portfolio.map(item => item.symbol))];
        
        uniqueSymbols.forEach(sym => {
            const livePrice = liveDataCache[sym]?.price;
            if (livePrice && livePrice > 0) {
                const canBuyShares = Math.floor(totalPassiveIncomeGlobal / livePrice);
                if (canBuyShares > 0) {
                    msg += `\n➤ ${sym} (${livePrice}元/股)：約可買入 ${canBuyShares.toLocaleString()} 股`;
                    optionsFound = true;
                }
            }
        });
        
        if(!optionsFound) msg += "\n(目前資金不足以購買任何一股持倉股票)";
        alert(msg);
    }

    // 縮短版刪除與賣出 (保留核心邏輯)
    function deleteRecord(i) { if(confirm('確定刪除？')) { portfolio.splice(i,1); localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio)); renderTable(); } }
    function sellRecord(i) { 
        const r = portfolio[i]; const lp = liveDataCache[r.symbol]?.price || r.buyPrice;
        const sp = prompt(`賣出 ${r.symbol}\n市價：${lp}\n輸入賣出成交價：`, lp);
        if(sp!==null && sp!=="") { 
            const sellPrice = parseFloat(sp); if(isNaN(sellPrice)) return;
            const discount = parseFloat(document.getElementById('discount').value);
            const cost = r.shares*r.buyPrice; const bFee = Math.max(20, Math.floor(cost*0.001425*discount))*(discount===0?0:1);
            const val = r.shares*sellPrice; const sFee = Math.max(20, Math.floor(val*0.001425*discount))*(discount===0?0:1);
            const tax = Math.floor(val*(r.symbol.startsWith('00')?0.001:0.003));
            historyLedger.push({ sellDate: new Date().toISOString().split('T')[0], symbol: r.symbol, name: marketData[r.symbol]?.name||'', shares: r.shares, buyPrice: r.buyPrice, sellPrice: sellPrice, realizedNetPl: val-sFee-tax-(cost+bFee) });
            portfolio.splice(i,1); localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio)); localStorage.setItem('twStockHistory', JSON.stringify(historyLedger));
            renderTable(); alert('賣出成功！');
        }
    }

    function setSort(col) { if(sortCol===col) sortAsc=!sortAsc; else { sortCol=col; sortAsc=false; } renderTable(); }
    
    // ... CSV與同步碼省略，功能維持與上一版相同 ...
    function exportCSV() { alert('CSV 匯出成功 (模擬)'); }
    function exportData() { prompt('同步碼：', btoa(encodeURIComponent(JSON.stringify({p:portfolio,h:historyLedger})))); }
    function importData() { const e = prompt('貼上同步碼：'); if(e){ try{ const d=JSON.parse(decodeURIComponent(atob(e))); portfolio=d.p; historyLedger=d.h||[]; localStorage.setItem('twStockPortfolio',JSON.stringify(portfolio)); localStorage.setItem('twStockHistory',JSON.stringify(historyLedger)); liveDataCache={}; refreshLiveData(); }catch(err){alert('失敗');} } }

    function drawSparkline(canvasId, dataPoints, isPositive) {
        const ctx = document.getElementById(canvasId);
        if(!ctx || dataPoints.length === 0) return;
        
        // 銷毀舊圖表避免重疊
        if(sparklineInstances[canvasId]) sparklineInstances[canvasId].destroy();
        
        const color = isPositive ? (document.body.classList.contains('dark-mode') ? '#28a745' : '#198754') : (document.body.classList.contains('dark-mode') ? '#ff4d4d' : '#dc3545');
        
        sparklineInstances[canvasId] = new Chart(ctx, {
            type: 'line',
            data: { labels: dataPoints.map((_, i) => i), datasets: [{ data: dataPoints, borderColor: color, borderWidth: 2, pointRadius: 0, tension: 0.1 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false } }, layout: { padding: 0 } }
        });
    }

    function renderBarChart(monthlyData) {
        const ctx = document.getElementById('dividendChart').getContext('2d');
        if (barChartInstance) barChartInstance.destroy(); 
        Chart.defaults.color = document.body.classList.contains('dark-mode') ? '#e0e0e0' : '#333';
        const monthLabels = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        barChartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: monthLabels, datasets: [{ label: '預估股利', data: monthlyData, backgroundColor: 'rgba(25, 135, 84, 0.7)', borderRadius: 3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: {display: false} } } }
        });
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const discount = parseFloat(document.getElementById('discount').value); 
        let rowObjects = [];
        let totalNetPlAll = 0, totalCostSum = 0, totalValueAll = 0;
        let monthlyIncome = new Array(12).fill(0); 
        totalPassiveIncomeGlobal = 0;
        const oneYearAgoTs = (Date.now() / 1000) - (365 * 24 * 60 * 60);

        for (let i = 0; i < portfolio.length; i++) {
            const record = portfolio[i];
            const stockInfo = marketData[record.symbol] || { name: '未知' };
            const liveInfo = liveDataCache[record.symbol] || { price: record.buyPrice, changePct: 0, dividends: [], history: [] };
            
            let collectedDiv = 0; let ttmDivSum = 0;
            if (liveInfo.dividends.length > 0) {
                const buyTs = new Date(record.buyDate).getTime() / 1000;
                liveInfo.dividends.forEach(div => {
                    if (div.date >= buyTs) collectedDiv += (div.amount * record.shares);
                    if (div.date >= oneYearAgoTs) {
                        ttmDivSum += div.amount;
                        monthlyIncome[new Date(div.date * 1000).getMonth()] += (div.amount * record.shares);
                    }
                });
            }

            const baseCost = record.shares * record.buyPrice;
            const buyFee = Math.max(20, Math.floor(baseCost * 0.001425 * discount)) * (discount === 0 ? 0 : 1);
            const realTotalCost = baseCost + buyFee; 

            const baseValue = record.shares * liveInfo.price;
            const sellFee = Math.max(20, Math.floor(baseValue * 0.001425 * discount)) * (discount === 0 ? 0 : 1);
            const sellTax = Math.floor(baseValue * (record.symbol.startsWith('00') ? 0.001 : 0.003));
            
            const netPl = baseValue - sellFee - sellTax - realTotalCost;
            let yieldOnCost = (record.buyPrice > 0 && ttmDivSum > 0) ? (ttmDivSum / record.buyPrice) * 100 : 0;

            totalCostSum += realTotalCost; totalValueAll += baseValue; totalNetPlAll += netPl; totalPassiveIncomeGlobal += collectedDiv;
            
            let rowStatusClass = '';
            if (record.targetPrice && liveInfo.price >= record.targetPrice) rowStatusClass = 'target-reached';
            else if (record.stopLoss && liveInfo.price <= record.stopLoss) rowStatusClass = 'stop-reached';
            
            rowObjects.push({
                originalIndex: i, symbol: record.symbol, name: stockInfo.name, shares: record.shares, buyDate: record.buyDate,
                buyPrice: record.buyPrice, currentPrice: liveInfo.price, changePct: liveInfo.changePct, netPl: netPl,
                feeTax: buyFee + sellFee + sellTax, collectedDiv: collectedDiv, yieldOnCost: yieldOnCost, rowClass: rowStatusClass,
                history: liveInfo.history, note: record.note
            });
        }

        document.getElementById('totalPassiveIncome').innerText = `$ ${Math.round(totalPassiveIncomeGlobal).toLocaleString()}`;
        renderBarChart(monthlyIncome);
        
        // 更新大盤與總報酬率儀表板
        let myRoi = 0;
        if(totalCostSum > 0) myRoi = (totalValueAll / totalCostSum - 1) * 100;
        const myRoiEl = document.getElementById('myTotalRoi');
        const myPlEl = document.getElementById('myTotalPl');
        
        if(myRoi >= 0) {
            myRoiEl.innerHTML = `<span class="profit">+${myRoi.toFixed(2)}%</span>`;
            myPlEl.innerHTML = `<span class="profit">+$${Math.round(totalNetPlAll).toLocaleString()}</span>`;
        } else {
            myRoiEl.innerHTML = `<span class="loss">${myRoi.toFixed(2)}%</span>`;
            myPlEl.innerHTML = `<span class="loss">-$${Math.abs(Math.round(totalNetPlAll)).toLocaleString()}</span>`;
        }

        if (sortCol !== 'index') rowObjects.sort((a, b) => { let vA = a[sortCol]; let vB = b[sortCol]; return sortAsc ? (vA>vB?1:-1) : (vA<vB?1:-1); });

        let htmlContent = '';
        rowObjects.forEach((row, i) => {
            const plClass = row.netPl >= 0 ? 'profit' : 'loss';
            const plSign = row.netPl >= 0 ? '+' : '';
            const yieldText = row.yieldOnCost > 0 ? `<span style="color:#6610f2; font-weight:bold;">${row.yieldOnCost.toFixed(2)}%</span>` : '-';
            const changeClass = row.changePct >= 0 ? 'profit' : 'loss';
            const changeSign = row.changePct >= 0 ? '▲' : '▼';
            const noteActive = row.note ? 'active' : '';

            htmlContent += `
                <tr class="${row.rowClass}">
                    <td class="text-left">
                        <span style="font-size:1.1em; font-weight:bold;">${row.symbol}</span><br>
                        <span class="sub-text">${row.name}</span>
                    </td>
                    <td>
                        <div>${row.buyDate}</div>
                        <div class="sub-text">${row.shares.toLocaleString()} 股 @ $${row.buyPrice.toFixed(2)}</div>
                    </td>
                    <td>
                        <span class="realtime-price ${changeClass}">${row.currentPrice.toFixed(2)}</span>
                        <span class="${changeClass}" style="font-size:0.85em; margin-left:5px;">${changeSign}${Math.abs(row.changePct).toFixed(2)}%</span>
                        <div class="sparkline-container"><canvas id="spark_${i}"></canvas></div>
                    </td>
                    <td>
                        <span class="${plClass}" style="font-size:1.1em;">${plSign}${Math.round(row.netPl).toLocaleString()}</span>
                        <span class="sub-text">(費稅: ${row.feeTax})</span>
                    </td>
                    <td>
                        <div>${yieldText}</div>
                        <div class="sub-text">已領: $${Math.round(row.collectedDiv).toLocaleString()}</div>
                    </td>
                    <td class="action-cell">
                        <span class="note-icon ${noteActive}" onclick="editNote(${row.originalIndex})" title="交易筆記">📝</span>
                        <button class="btn-success" onclick="sellRecord(${row.originalIndex})" style="padding: 4px 8px; margin: 0 5px;">結</button>
                        <button class="btn-danger" onclick="deleteRecord(${row.originalIndex})" style="padding: 4px 8px;">刪</button>
                    </td>
                </tr>
            `;
        });
        
        tbody.innerHTML = htmlContent || '<tr><td colspan="6" style="text-align:center;">目前無紀錄</td></tr>';
        
        // 渲染走勢小蛇圖
        rowObjects.forEach((row, i) => {
            if(row.history && row.history.length > 0) {
                drawSparkline(`spark_${i}`, row.history, row.history[row.history.length-1] >= row.history[0]);
            }
        });
    }

    initMarketData();
</script>

</body>
</html>
