<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股損益與配息紀錄本</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; max-width: 1200px; margin: auto; background-color: #f4f7f6; color: #333; }
        .container { background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* 手機版排版優化 */
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 15px; }
        .input-group input { flex: 1; min-width: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
        .setting-box { background-color: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e9ecef; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95em; transition: 0.2s; white-space: nowrap; }
        .btn-primary { background-color: #0d6efd; color: white; }
        .btn-primary:hover { background-color: #0b5ed7; }
        .btn-primary:disabled { background-color: #cccccc; cursor: not-allowed; }
        .btn-danger { background-color: #dc3545; color: white; padding: 6px 12px; }
        .btn-danger:hover { background-color: #c82333; }
        .btn-success { background-color: #198754; color: white; padding: 6px 12px; }
        .btn-success:hover { background-color: #157347; }
        .btn-info { background-color: #0dcaf0; color: #000; }
        .btn-info:hover { background-color: #31d2f2; }
        
        /* 表格手機版左右滑動 */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 6px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 0.95em; min-width: 800px; }
        th, td { border-bottom: 1px solid #eee; border-right: 1px solid #eee; padding: 12px; text-align: right; vertical-align: middle; }
        th { background-color: #f8f9fa; text-align: center; white-space: nowrap; }
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { background-color: #e2e2e2; }
        td:first-child, td:nth-child(2) { text-align: left; font-weight: bold; }
        td.action-cell { text-align: center; white-space: nowrap; }
        
        .profit { color: #198754; font-weight: bold; }
        .loss { color: #dc3545; font-weight: bold; }
        .realtime-price { color: #0d6efd; font-weight: bold; font-size: 1.05em; }
        .div-info { font-size: 0.85em; color: #666; text-align: center; }
        .div-amount { color: #d35400; font-weight: bold; }
        .fee-hint { font-size: 0.75em; color: #999; display: block; margin-top: 4px; font-weight: normal; }
        
        /* 儀表板區域 */
        .dashboard { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .chart-container { flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        /* 【修復關鍵】：給圓餅圖一個絕對的高度限制，防止無限膨脹 */
        .chart-wrapper { position: relative; height: 220px; width: 100%; } 
        
        .progress-container { flex: 2; min-width: 300px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; }
        
        /* 進度條樣式 */
        .progress-bar-bg { width: 100%; background-color: #e9ecef; border-radius: 10px; overflow: hidden; height: 25px; margin-top: 15px; position: relative; }
        .progress-bar-fill { height: 100%; background-color: #0d6efd; transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8em; font-weight: bold; }
        .target-input { width: 80px; padding: 5px; margin-left: 10px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="chart-container">
        <h3 style="margin-top: 0; margin-bottom: 10px; text-align: center;">資金佔比圓餅圖</h3>
        <div class="chart-wrapper">
            <canvas id="portfolioChart"></canvas>
        </div>
    </div>
    <div class="progress-container">
        <h3 style="margin-top: 0;">本月存股目標進度</h3>
        <div>
            每月目標額度：<input type="number" id="monthlyTarget" class="target-input" value="5000" onchange="renderProgress()"> 元
        </div>
        <div class="progress-bar-bg">
            <div id="progressFill" class="progress-bar-fill" style="width: 0%;">0%</div>
        </div>
        <p id="progressText" style="color: #666; font-size: 0.9em; margin-top: 10px;">本月已投入：0 元</p>
    </div>
</div>

<div class="container">
    <h2 style="margin-top: 0;">📈 我的投資組合 (未實現損益)</h2>
    <div id="status" style="margin-bottom: 15px; font-weight: bold; color: #666;">啟動中...</div>
    
    <div class="setting-box">
        <div>
            <label>⚙️ 券商手續費：</label>
            <select id="discount" onchange="renderTable()" style="padding: 8px; border-radius: 4px;">
                <option value="1.0" selected>無折扣 (全額收取)</option>
                <option value="0.5">5 折</option>
                <option value="0.28">2.8 折</option>
                <option value="0.2">2 折</option>
            </select>
        </div>
        <div>
            <button class="btn-info" onclick="exportData()">📲 手機同步碼</button>
            <button class="btn-info" onclick="importData()">📥 匯入資料</button>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="symbol" placeholder="股票代號 (例: 00878)" required>
        <input type="number" id="shares" placeholder="購買股數" required>
        <input type="number" id="buyPrice" placeholder="買進均價" required step="0.01">
        <button id="addBtn" class="btn-primary" onclick="addRecord()" disabled>➕ 新增紀錄</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>代號</th>
                    <th>名稱</th>
                    <th class="sortable" onclick="setSort('shares')">持有股數 ↕️</th>
                    <th>買進均價</th>
                    <th class="sortable" onclick="setSort('currentPrice')">最新報價 ↕️</th>
                    <th class="sortable" onclick="setSort('netPl')">預估淨損益 ↕️<br><span class="fee-hint">(已扣費與稅)</span></th>
                    <th>近期配息</th>
                    <th class="sortable" onclick="setSort('estDividend')">預估股利 ↕️</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="container" style="background-color: #fafafa;">
    <h2 style="margin-top: 0; color: #555;">💰 歷史帳本 (已實現損益)</h2>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>賣出日期</th>
                    <th>代號名稱</th>
                    <th>賣出股數</th>
                    <th>買進均價</th>
                    <th>賣出成交價</th>
                    <th>實收淨損益<br><span class="fee-hint">(已真實扣除費稅)</span></th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    let portfolio = JSON.parse(localStorage.getItem('twStockPortfolio')) || [];
    let historyLedger = JSON.parse(localStorage.getItem('twStockHistory')) || [];
    let marketData = {};
    let liveDataCache = {}; 
    let sortCol = 'index';
    let sortAsc = true;
    let pieChartInstance = null;

    async function fetchGovData(url) {
        const ts = new Date().getTime();
        const proxies = ['https://corsproxy.io/?' + encodeURIComponent(url + '?_t=' + ts), 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url + '?_t=' + ts)];
        for (let p of proxies) {
            try {
                const res = await fetch(p);
                if (res.ok) return await res.json();
            } catch(e) {}
        }
        return null;
    }

    async function initMarketData() {
        document.getElementById('status').innerHTML = '⏳ 正在連線市場資料庫...';
        const twseData = await fetchGovData('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
        if (twseData) twseData.forEach(stock => { marketData[stock.Code] = { name: stock.Name, market: 'TW', price: parseFloat(stock.ClosingPrice) }; });
        const tpexData = await fetchGovData('https://www.tpex.org.tw/openapi/v1/t187ap14_L');
        if (tpexData) tpexData.forEach(stock => { marketData[stock.SecuritiesCompanyCode] = { name: stock.CompanyName, market: 'TWO', price: parseFloat(stock.Close) }; });

        document.getElementById('addBtn').disabled = false;
        refreshLiveData();
        renderHistoryTable();
    }

    async function refreshLiveData() {
        if(portfolio.length > 0) document.getElementById('status').innerHTML = '🔄 正在同步最新報價...';
        const ts = new Date().getTime();

        for (let record of portfolio) {
            if (liveDataCache[record.symbol]) continue; 
            const stockInfo = marketData[record.symbol] || { market: 'TW' };
            const suffix = stockInfo.market === 'TWO' ? '.TWO' : '.TW';
            let currentPrice = stockInfo.price || record.buyPrice;
            let divText = '<span style="color:#999;">無近期配息</span>';
            let divAmount = 0;

            try {
                const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${record.symbol}${suffix}?range=1y&interval=1d&events=div&_t=${ts}`));
                if (res.ok) {
                    const data = await res.json();
                    if (data.chart && data.chart.result) {
                        const result = data.chart.result[0];
                        currentPrice = result.meta.regularMarketPrice || currentPrice; 
                        if (result.events && result.events.dividends) {
                            const divs = Object.values(result.events.dividends).sort((a, b) => b.date - a.date);
                            if (divs.length > 0) {
                                divAmount = divs[0].amount;
                                const d = new Date(divs[0].date * 1000);
                                divText = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} <br><span class="div-amount">${divAmount.toFixed(3)}</span> 元`;
                            }
                        }
                    }
                }
            } catch(e) {}
            liveDataCache[record.symbol] = { price: currentPrice, divText: divText, divAmount: divAmount };
        }
        document.getElementById('status').innerHTML = '✅ 報價資料已更新！';
        document.getElementById('status').style.color = '#198754';
        renderTable();
        renderProgress();
    }

    function addRecord() {
        const symbol = document.getElementById('symbol').value.trim();
        const shares = parseFloat(document.getElementById('shares').value);
        const buyPrice = parseFloat(document.getElementById('buyPrice').value);

        if (!symbol || isNaN(shares) || isNaN(buyPrice)) { alert('請填寫完整資訊！'); return; }
        if (!marketData[symbol]) { alert(`找不到 ${symbol}，請確認代號是否正確。`); return; }

        portfolio.push({ symbol: symbol, shares: shares, buyPrice: buyPrice, buyDate: new Date().toISOString() });
        localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio));
        
        document.getElementById('symbol').value = ''; document.getElementById('shares').value = ''; document.getElementById('buyPrice').value = '';
        refreshLiveData(); 
    }

    function sellRecord(index) {
        const record = portfolio[index];
        const livePrice = liveDataCache[record.symbol]?.price || record.buyPrice;
        
        const sellPriceInput = prompt(`準備獲利了結 ${record.symbol}！\n\n系統抓取的目前市價為：${livePrice} 元\n請輸入您實際賣出的成交價：`, livePrice);
        
        if (sellPriceInput !== null && sellPriceInput.trim() !== "") {
            const sellPrice = parseFloat(sellPriceInput);
            if(isNaN(sellPrice)) { alert("請輸入有效的數字！"); return; }
            
            const discount = parseFloat(document.getElementById('discount').value); 
            const baseCost = record.shares * record.buyPrice;
            const buyFee = Math.max(20, Math.floor(baseCost * 0.001425 * discount)) * (discount === 0 ? 0 : 1);
            const realTotalCost = baseCost + buyFee; 

            const baseValue = record.shares * sellPrice;
            const sellFee = Math.max(20, Math.floor(baseValue * 0.001425 * discount)) * (discount === 0 ? 0 : 1);
            const taxRate = record.symbol.startsWith('00') ? 0.001 : 0.003;
            const sellTax = Math.floor(baseValue * taxRate);
            
            const realizedNetPl = baseValue - sellFee - sellTax - realTotalCost;

            const d = new Date();
            const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
            historyLedger.push({
                sellDate: dateStr,
                symbol: record.symbol,
                name: marketData[record.symbol]?.name || '未知',
                shares: record.shares,
                buyPrice: record.buyPrice,
                sellPrice: sellPrice,
                realizedNetPl: realizedNetPl
            });
            
            portfolio.splice(index, 1);
            localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio));
            localStorage.setItem('twStockHistory', JSON.stringify(historyLedger));
            
            renderTable();
            renderHistoryTable();
            renderProgress();
            alert(`✅ 賣出成功！已結算損益並記錄至歷史帳本。`);
        }
    }

    function deleteRecord(index) {
        if (confirm('確定要直接刪除這筆紀錄嗎？(這不會記錄到歷史帳本)')) {
            portfolio.splice(index, 1);
            localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio));
            renderTable();
            renderProgress();
        }
    }
    
    function deleteHistory(index) {
        if (confirm('確定要刪除這筆歷史紀錄嗎？')) {
            historyLedger.splice(index, 1);
            localStorage.setItem('twStockHistory', JSON.stringify(historyLedger));
            renderHistoryTable();
        }
    }

    function setSort(col) {
        if (sortCol === col) sortAsc = !sortAsc; 
        else { sortCol = col; sortAsc = false; }
        renderTable();
    }

    function exportData() {
        const data = { p: portfolio, h: historyLedger };
        const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
        prompt('請複製以下「同步碼」，傳到手機上的 LINE，再從手機點選「匯入」：', encoded);
    }

    function importData() {
        const encoded = prompt('請貼上從電腦傳來的「同步碼」：\n(⚠️警告：這會覆蓋當前裝置上的資料)');
        if (encoded) {
            try {
                const decodedJson = JSON.parse(decodeURIComponent(atob(encoded)));
                if(decodedJson.p) {
                    portfolio = decodedJson.p;
                    historyLedger = decodedJson.h || [];
                    localStorage.setItem('twStockPortfolio', JSON.stringify(portfolio));
                    localStorage.setItem('twStockHistory', JSON.stringify(historyLedger));
                    liveDataCache = {}; 
                    alert('✅ 手機同步成功！');
                    refreshLiveData();
                    renderHistoryTable();
                }
            } catch (e) { alert('❌ 同步碼錯誤。'); }
        }
    }

    function renderProgress() {
        const target = parseFloat(document.getElementById('monthlyTarget').value) || 5000;
        const now = new Date();
        let thisMonthCost = 0;

        portfolio.forEach(record => {
            let isThisMonth = true;
            if(record.buyDate) {
                const bDate = new Date(record.buyDate);
                if(bDate.getMonth() !== now.getMonth() || bDate.getFullYear() !== now.getFullYear()) {
                    isThisMonth = false;
                }
            }
            if(isThisMonth) {
                thisMonthCost += (record.shares * record.buyPrice);
            }
        });

        let percent = (thisMonthCost / target) * 100;
        if (percent > 100) percent = 100;

        const fillEl = document.getElementById('progressFill');
        fillEl.style.width = percent + '%';
        fillEl.innerText = Math.round(percent) + '%';
        
        if(percent >= 100) { fillEl.style.backgroundColor = '#198754'; } 
        else { fillEl.style.backgroundColor = '#0d6efd'; }

        document.getElementById('progressText').innerText = `本月已投入：${Math.round(thisMonthCost).toLocaleString()} 元`;
    }

    function renderChart(labels, dataValues) {
        const ctx = document.getElementById('portfolioChart').getContext('2d');
        if (pieChartInstance) pieChartInstance.destroy(); 

        if (dataValues.length === 0 || dataValues.reduce((a, b) => a + b, 0) === 0) {
            pieChartInstance = new Chart(ctx, { type: 'pie', data: { labels: ['目前無資產'], datasets: [{ data: [1], backgroundColor: ['#eee'] }] }, options: { responsive: true, maintainAspectRatio: false } });
            return;
        }

        pieChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: dataValues,
                    backgroundColor: ['#0d6efd', '#198754', '#dc3545', '#ffc107', '#0dcaf0', '#6610f2', '#fd7e14', '#20c997'],
                    borderWidth: 1
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
        });
    }

    function renderHistoryTable() {
        const tbody = document.getElementById('historyBody');
        let htmlContent = '';
        let totalRealizedPl = 0;

        historyLedger.forEach((record, index) => {
            totalRealizedPl += record.realizedNetPl;
            const plClass = record.realizedNetPl >= 0 ? 'profit' : 'loss';
            const plSign = record.realizedNetPl >= 0 ? '+' : '';
            
            htmlContent += `
                <tr>
                    <td>${record.sellDate}</td>
                    <td>${record.symbol} ${record.name}</td>
                    <td>${record.shares.toLocaleString()}</td>
                    <td>${record.buyPrice.toFixed(2)}</td>
                    <td>${record.sellPrice.toFixed(2)}</td>
                    <td class="${plClass}">${plSign}${Math.round(record.realizedNetPl).toLocaleString()}</td>
                    <td class="action-cell"><button class="btn-danger" style="padding: 2px 6px; font-size: 0.8em;" onclick="deleteHistory(${index})">刪除</button></td>
                </tr>
            `;
        });

        if(historyLedger.length > 0) {
            const totalPlClass = totalRealizedPl >= 0 ? 'profit' : 'loss';
            const totalPlSign = totalRealizedPl >= 0 ? '+' : '';
            htmlContent += `
                <tr style="background-color: #f8f9fa; font-weight: bold;">
                    <td colspan="5" style="text-align: center;">總結算淨利：</td>
                    <td class="${totalPlClass}" style="font-size:1.1em;">${totalPlSign}${Math.round(totalRealizedPl).toLocaleString()}</td>
                    <td></td>
                </tr>
            `;
        } else {
            htmlContent = '<tr><td colspan="7" style="text-align:center;">目前無歷史賣出紀錄</td></tr>';
        }
        tbody.innerHTML = htmlContent;
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const discount = parseFloat(document.getElementById('discount').value); 
        let rowObjects = [];
        let totalNetPlAll = 0, totalValueAll = 0;
        let chartLabels = [];
        let chartData = [];

        for (let i = 0; i < portfolio.length; i++) {
            const record = portfolio[i];
            const stockInfo = marketData[record.symbol] || { name: '未知' };
            const liveInfo = liveDataCache[record.symbol] || { price: record.buyPrice, divAmount: 0, divText: '載入中...' };
            
            const baseCost = record.shares * record.buyPrice;
            const buyFee = Math.max(20, Math.floor(baseCost * 0.001425 * discount)) * (discount === 0 ? 0 : 1);
            const realTotalCost = baseCost + buyFee; 

            const baseValue = record.shares * liveInfo.price;
            const sellFee = Math.max(20, Math.floor(baseValue * 0.001425 * discount)) * (discount === 0 ? 0 : 1);
            const taxRate = record.symbol.startsWith('00') ? 0.001 : 0.003;
            const sellTax = Math.floor(baseValue * taxRate);
            
            const netPl = baseValue - sellFee - sellTax - realTotalCost;
            const estDividend = Math.floor(record.shares * liveInfo.divAmount);

            totalValueAll += baseValue;
            totalNetPlAll += netPl;
            
            let existingIndex = chartLabels.indexOf(record.symbol);
            if(existingIndex > -1) { chartData[existingIndex] += baseValue; } 
            else { chartLabels.push(record.symbol); chartData.push(baseValue); }
            
            rowObjects.push({
                originalIndex: i, symbol: record.symbol, name: stockInfo.name, shares: record.shares,
                buyPrice: record.buyPrice, currentPrice: liveInfo.price, netPl: netPl,
                feeTax: buyFee + sellFee + sellTax, divText: liveInfo.divText, estDividend: estDividend
            });
        }

        renderChart(chartLabels, chartData);

        if (sortCol !== 'index') {
            rowObjects.sort((a, b) => {
                let valA = a[sortCol]; let valB = b[sortCol];
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        let htmlContent = '';
        rowObjects.forEach(row => {
            const plClass = row.netPl >= 0 ? 'profit' : 'loss';
            const plSign = row.netPl >= 0 ? '+' : '';
            const estDividendText = row.estDividend > 0 ? `<span style="color:#198754; font-weight:bold;">$${row.estDividend.toLocaleString()}</span>` : '-';

            htmlContent += `
                <tr>
                    <td>${row.symbol}</td>
                    <td>${row.name}</td>
                    <td>${row.shares.toLocaleString()}</td>
                    <td>${row.buyPrice.toFixed(2)}</td>
                    <td class="realtime-price">${row.currentPrice.toFixed(2)}</td>
                    <td class="${plClass}">
                        ${plSign}${Math.round(row.netPl).toLocaleString()}
                        <span class="fee-hint">(扣費稅: ${row.feeTax})</span>
                    </td>
                    <td class="div-info">${row.divText}</td>
                    <td style="text-align:center;">${estDividendText}</td>
                    <td class="action-cell">
                        <button class="btn-success" onclick="sellRecord(${row.originalIndex})">賣出結算</button>
                        <button class="btn-danger" onclick="deleteRecord(${row.originalIndex})">刪除</button>
                    </td>
                </tr>
            `;
        });

        if(portfolio.length > 0) {
            const totalPlClass = totalNetPlAll >= 0 ? 'profit' : 'loss';
            const totalPlSign = totalNetPlAll >= 0 ? '+' : '';
            htmlContent += `
                <tr style="background-color: #f8f9fa; font-weight: bold;">
                    <td colspan="5" style="text-align: center;">總淨損益：</td>
                    <td class="${totalPlClass}" style="font-size:1.1em;">${totalPlSign}${Math.round(totalNetPlAll).toLocaleString()}</td>
                    <td colspan="3"></td>
                </tr>
            `;
        } else {
            htmlContent = '<tr><td colspan="9" style="text-align:center;">目前沒有未實現紀錄</td></tr>';
        }
        
        document.getElementById('tableBody').innerHTML = htmlContent;
    }

    initMarketData();
</script>
